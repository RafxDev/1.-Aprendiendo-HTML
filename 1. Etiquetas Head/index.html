<!DOCTYPE html>
<html lang="en">

<head>

    <!--metadato que indica al navegador qué codificación de caracteres usa la página.-->
    <meta charset="UTF-8">

    <!--metadato que indica al navegador que debe usar el modo de compatibilidad más reciente de Internet Explorer.-->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!--metadato que define el ancho de la página y el zoom inicialen dispositivos móviles-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--metadato que define el título de la página-->
    <title>Document</title>

    <!--metadato que proporciona información sobre el autor de la página-->
    <meta name="author" content="RafxDev">

    <!--metadato que proporciona una descripción breve del contenido de la página--> 
    <meta name="description" content="Esta es una página de ejemplo para demostrar el uso de etiquetas en el head.">

    <!--metadato que proporciona palabras clave relacionadas con el contenido de la página para mejorar el SEO-->
    <meta name="keywords" content="HTML, etiquetas, head, metadatos, ejemplo">

    <!--metadato que indica al navegador que debe refrescar la página cada 5 segundos y redirigir a X Sitio Web-->
    <meta http-equiv="refresh" content="5;url=https://www.google.com">

    <!--metadato que establece una cookie con el nombre "name" y el valor "value", que expirará el 31 de diciembre de 9999 a las 23:59:59 GMT y será válida para todo el sitio web (path=/)-->
    <meta http-equiv="cookie" content="name=value; expires=Fri, 31 Dec 9999 23:59:59 GMT; path=/">

    <!--enlace a un archivo de estilo CSS-->
    <link rel="stylesheet" href="style.css">

    <!--enlace a un icono para la pestaña del navegador-->
    <link rel="icon" href="favicon.ico" type="image/x-icon">


</head>


<body>
    
    <!--enlace a un archivo de script JavaScript-->
    <script src="script.js"></script>

</body>
</html>
